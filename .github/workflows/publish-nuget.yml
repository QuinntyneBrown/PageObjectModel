name: Publish to NuGet

# Builds, tests, packs, and publishes the PlaywrightPomGenerator tool to NuGet on every
# push to main. Commits that do not bump <Version> are a no-op at the push step thanks to
# --skip-duplicate, so this is safe to run on every commit.

on:
  push:
    branches: [main]

# Least privilege: this job only needs to read the repo; the NuGet credential is a secret.
permissions:
  contents: read

# Never run two publishes at once (e.g. two quick commits); don't cancel an in-flight push.
concurrency:
  group: publish-nuget
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The analysis engine and the 'bridge' command use the Node TypeScript AST sidecar.
      - name: Install sidecar dependencies
        working-directory: src/PlaywrightPomGenerator.Sidecar.Node
        run: npm ci

      - name: Test sidecar (node:test)
        working-directory: src/PlaywrightPomGenerator.Sidecar.Node
        run: node --test "test/*.test.js"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/PlaywrightPomGenerator.Cli/PlaywrightPomGenerator.Cli.csproj --configuration Release --no-build --output ${{ runner.temp }}/nupkg

      # Smoke test the PACKED tool: the only pre-publish exercise of the real nupkg
      # sidecar layout (tools/net8.0/any/sidecar/). Asserts the AST engine works from
      # the shipped sidecar and that the regex escape hatch stays green.
      - name: Smoke test packed tool
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' src/PlaywrightPomGenerator.Cli/PlaywrightPomGenerator.Cli.csproj)
          dotnet tool install --global PlaywrightPomGenerator --version "$VERSION" --add-source "${{ runner.temp }}/nupkg"

          FIXTURE="${{ runner.temp }}/smoke-app"
          mkdir -p "$FIXTURE/src/app"
          cat > "$FIXTURE/package.json" <<'EOF'
          {
            "name": "smoke-app",
            "dependencies": { "@angular/core": "^19.2.0", "@angular/compiler": "^19.2.0" },
            "devDependencies": { "typescript": "~5.7.0" }
          }
          EOF
          cat > "$FIXTURE/src/app/home.component.ts" <<'EOF'
          import { Component } from '@angular/core';
          @Component({
            selector: 'app-home',
            template: '<button data-testid="go">Go</button>'
          })
          export class HomeComponent {}
          EOF
          (cd "$FIXTURE" && npm install --no-audit --no-fund --legacy-peer-deps typescript @angular/compiler)

          OUT=$(ppg app "$FIXTURE" -o "${{ runner.temp }}/smoke-out")
          echo "$OUT"
          echo "$OUT" | grep -q "Analysis engine: AST" || { echo "expected the AST engine from the shipped sidecar"; exit 1; }

          OUT2=$(ppg app "$FIXTURE" -o "${{ runner.temp }}/smoke-out-regex" --engine regex --no-component-objects)
          echo "$OUT2"
          echo "$OUT2" | grep -q "Analysis engine: regex" || { echo "expected the regex engine banner"; exit 1; }

      # Pushing the .nupkg auto-publishes the adjacent .snupkg symbols; the explicit symbols
      # push below is a belt-and-suspenders no-op (--skip-duplicate) in case it does not.
      - name: Push package to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: >-
          dotnet nuget push "${{ runner.temp }}/nupkg/*.nupkg"
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push symbols to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: >-
          dotnet nuget push "${{ runner.temp }}/nupkg/*.snupkg"
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
